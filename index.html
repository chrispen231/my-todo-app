<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F2EC;
      --surface: #FFFFFF;
      --accent: #2D6A4F;
      --accent-light: #D8F3DC;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-muted: #ADADAD;
      --border: #E4E0D8;
      --danger: #C0392B;
      --danger-light: #FDECEA;
      --done-text: #ADADAD;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
      color: var(--text-primary);
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C4BB 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      margin-bottom: 36px;
    }

    .header-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .date-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.3px;
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }

    .stat {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .stat span {
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Add task form */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .add-input {
      flex: 1;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: var(--shadow);
    }

    .add-input::placeholder { color: var(--text-muted); }

    .add-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(45,106,79,0.10);
    }

    .add-btn {
      padding: 14px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    .add-btn:hover { background: #245A42; }
    .add-btn:active { transform: scale(0.97); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
      animation: slideIn 0.22s ease;
      transition: border-color 0.2s, opacity 0.2s;
    }

    .task-item:hover { border-color: #D0CCC4; }

    .task-item.done {
      background: #FAFAF8;
      border-color: #EDEBE6;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Custom checkbox */
    .task-check {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      position: relative;
    }

    .task-check:hover { border-color: var(--accent); }

    .task-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .task-check:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.4;
      transition: color 0.2s;
      word-break: break-word;
    }

    .task-item.done .task-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 16px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: var(--danger-light);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 15px;
      font-weight: 300;
    }

    /* Clear completed */
    .bottom-bar {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--danger); }
    .clear-btn:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-top">
        <h1>My To-Do List</h1>
        <span class="date-label" id="date-label"></span>
      </div>
      <div class="stats-row">
        <div class="stat"><span id="remaining-count">0</span> remaining</div>
        <div class="stat"><span id="done-count">0</span> completed</div>
      </div>
    </div>

    <div class="add-form">
      <input
        class="add-input"
        id="task-input"
        type="text"
        placeholder="Add a new task..."
        maxlength="200"
        autocomplete="off"
      />
      <button class="add-btn" id="add-btn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Completed</button>
    </div>

    <div class="task-list" id="task-list"></div>

    <div class="bottom-bar">
      <button class="clear-btn" id="clear-btn" disabled>Clear completed</button>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────
    let tasks = JSON.parse(localStorage.getItem('mr-wreh-todos') || '[]');
    let filter = 'all';

    // ── Save ───────────────────────────────────────────────────
    function save() {
      localStorage.setItem('mr-wreh-todos', JSON.stringify(tasks));
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('task-list');
      const remaining = tasks.filter(t => !t.done).length;
      const done = tasks.filter(t => t.done).length;

      document.getElementById('remaining-count').textContent = remaining;
      document.getElementById('done-count').textContent = done;

      const clearBtn = document.getElementById('clear-btn');
      clearBtn.disabled = done === 0;

      const visible = tasks.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return t.done;
        return true;
      });

      if (visible.length === 0) {
        const msg = filter === 'done'
          ? 'No completed tasks yet.'
          : filter === 'active'
          ? 'Nothing left to do!'
          : 'Add your first task above.';
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><p>${msg}</p></div>`;
        return;
      }

      list.innerHTML = visible.map(task => `
        <div class="task-item ${task.done ? 'done' : ''}" data-id="${task.id}">
          <input
            type="checkbox"
            class="task-check"
            ${task.done ? 'checked' : ''}
            aria-label="Mark task complete"
            onchange="toggleTask('${task.id}')"
          />
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="delete-btn" onclick="deleteTask('${task.id}')" aria-label="Delete task">✕</button>
        </div>
      `).join('');
    }

    // ── Helpers ────────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    // ── Actions ────────────────────────────────────────────────
    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: generateId(), text, done: false, createdAt: Date.now() });
      input.value = '';
      save();
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }

    // ── Event Listeners ────────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', addTask);

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    document.getElementById('clear-btn').addEventListener('click', clearCompleted);

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // ── Date label ─────────────────────────────────────────────
    const today = new Date();
    document.getElementById('date-label').textContent = today.toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    // ── Init ───────────────────────────────────────────────────
    render();
  </script>
</body>
</html>

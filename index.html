<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F2EC;
      --surface: #FFFFFF;
      --accent: #2D6A4F;
      --accent-light: #D8F3DC;
      --text-primary: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-muted: #ADADAD;
      --border: #E4E0D8;
      --danger: #C0392B;
      --danger-light: #FDECEA;
      --done-text: #ADADAD;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --high-bg: #FEF2F2; --high-border: #FECACA; --high-text: #991B1B; --high-dot: #EF4444;
      --med-bg: #FFFBEB;  --med-border: #FDE68A;  --med-text: #92400E;  --med-dot: #F59E0B;
      --low-bg: #F0FDF4;  --low-border: #BBF7D0;  --low-text: #166534;  --low-dot: #22C55E;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 100px;
      color: var(--text-primary);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C4BB 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 580px; }

    /* Header */
    .header { margin-bottom: 28px; }
    .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 42px; font-weight: 400; letter-spacing: -0.5px; line-height: 1; }
    .date-label { font-size: 13px; color: var(--text-muted); font-weight: 300; }
    .stats-row { display: flex; gap: 20px; margin-bottom: 14px; }
    .stat { font-size: 13px; color: var(--text-secondary); }
    .stat span { font-weight: 500; color: var(--text-primary); }

    /* Progress bar */
    .progress-wrap { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 4px; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
    .progress-label { font-size: 12px; color: var(--text-muted); text-align: right; }
    .progress-label.all-done { color: var(--accent); font-weight: 500; }

    /* Add form */
    .add-form {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .add-row-1 { display: flex; gap: 10px; }
    .add-input {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      color: var(--text-primary); background: var(--bg);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .add-input::placeholder { color: var(--text-muted); }
    .add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,79,0.10); }
    .add-btn {
      padding: 11px 22px; background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap;
    }
    .add-btn:hover { background: #245A42; }
    .add-btn:active { transform: scale(0.97); }

    .add-row-2 { display: flex; gap: 10px; align-items: center; }
    .add-row-2 label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .priority-select, .due-input {
      flex: 1; padding: 8px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-primary); background: var(--bg);
      outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .priority-select:focus, .due-input:focus { border-color: var(--accent); }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
    .filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 13px; border-radius: 20px;
      border: 1.5px solid var(--border); background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .sort-select {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 20px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-secondary); background: transparent; outline: none; cursor: pointer;
    }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      background: var(--surface); border-radius: var(--radius);
      border: 1.5px solid var(--border); box-shadow: var(--shadow);
      animation: slideIn 0.2s ease;
      transition: border-color 0.2s, opacity 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .task-item:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.09); }
    .task-item.done { background: #FAFAF8; border-color: #EDEBE6; opacity: 0.75; }
    .task-item.priority-high { border-left: 4px solid var(--high-dot); }
    .task-item.priority-med  { border-left: 4px solid var(--med-dot); }
    .task-item.priority-low  { border-left: 4px solid var(--low-dot); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-main { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }

    .task-check {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px;
      border: 2px solid var(--border); border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.2s; position: relative;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check:checked { background: var(--accent); border-color: var(--accent); }
    .task-check:checked::after {
      content: ''; position: absolute;
      left: 5px; top: 2px; width: 6px; height: 10px;
      border: 2px solid #fff; border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 15px; color: var(--text-primary);
      line-height: 1.4; word-break: break-word;
      cursor: pointer; display: block;
    }
    .task-text:hover { color: var(--accent); }
    .task-item.done .task-text {
      color: var(--done-text);
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
      cursor: default;
    }
    .task-item.done .task-text:hover { color: var(--done-text); }

    .task-edit-input {
      width: 100%; font-family: 'DM Sans', sans-serif; font-size: 15px;
      color: var(--text-primary); border: none;
      border-bottom: 2px solid var(--accent);
      background: transparent; outline: none; padding: 2px 0;
    }

    .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
    .priority-badge {
      font-size: 11px; font-weight: 500; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .priority-badge.high { background: var(--high-bg); color: var(--high-text); border: 1px solid var(--high-border); }
    .priority-badge.med  { background: var(--med-bg);  color: var(--med-text);  border: 1px solid var(--med-border); }
    .priority-badge.low  { background: var(--low-bg);  color: var(--low-text);  border: 1px solid var(--low-border); }

    .due-badge { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
    .due-badge.overdue { color: var(--danger); font-weight: 500; }
    .due-badge.today   { color: #D97706; font-weight: 500; }

    .task-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 5px 7px; border-radius: 6px;
      font-size: 14px; line-height: 1; transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-light); }
    .icon-btn.delete:hover { color: var(--danger); background: var(--danger-light); }

    /* Empty / celebration */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 15px; font-weight: 300; }

    .celebration { text-align: center; padding: 40px 20px; animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    .celebration-icon { font-size: 44px; margin-bottom: 10px; }
    .celebration h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; color: var(--accent); margin-bottom: 6px; }
    .celebration p { font-size: 14px; color: var(--text-muted); font-weight: 300; }

    /* Bottom bar */
    .bottom-bar { display: flex; justify-content: flex-end; margin-top: 16px; }
    .clear-btn {
      background: none; border: none; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 4px 0; transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }
    .clear-btn:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <h1>My To-Do List</h1>
      <span class="date-label" id="date-label"></span>
    </div>
    <div class="stats-row">
      <div class="stat"><span id="remaining-count">0</span> remaining</div>
      <div class="stat"><span id="done-count">0</span> completed</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0% complete</div>
  </div>

  <div class="add-form">
    <div class="add-row-1">
      <input class="add-input" id="task-input" type="text"
        placeholder="What needs to be done?" maxlength="200" autocomplete="off"/>
      <button class="add-btn" id="add-btn">Add</button>
    </div>
    <div class="add-row-2">
      <label for="priority-select">Priority</label>
      <select class="priority-select" id="priority-select">
        <option value="none">None</option>
        <option value="high">🔴 High</option>
        <option value="med">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <label for="due-input">Due date</label>
      <input class="due-input" id="due-input" type="date"/>
    </div>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Completed</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="newest">Newest first</option>
      <option value="priority">By priority</option>
      <option value="due">By due date</option>
    </select>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="bottom-bar">
    <button class="clear-btn" id="clear-btn" disabled>Clear completed</button>
  </div>

</div>
<script>
  let tasks     = JSON.parse(localStorage.getItem('todo-v2') || '[]');
  let filter    = 'all';
  let sort      = 'newest';
  let editingId = null;

  function save() { localStorage.setItem('todo-v2', JSON.stringify(tasks)); }

  function esc(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function getDueStatus(due) {
    if (!due) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(due + 'T00:00:00');
    if (d < today) return 'overdue';
    if (d.getTime() === today.getTime()) return 'today';
    return 'future';
  }

  function formatDue(due) {
    if (!due) return '';
    return new Date(due + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  const PRI = { high: 0, med: 1, low: 2, none: 3 };

  function sortedVisible() {
    let list = tasks.filter(t => {
      if (filter === 'active') return !t.done;
      if (filter === 'done')   return t.done;
      return true;
    });
    if (sort === 'priority') {
      list = [...list].sort((a,b) => (PRI[a.priority||'none']) - (PRI[b.priority||'none']));
    } else if (sort === 'due') {
      list = [...list].sort((a,b) => {
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due);
      });
    }
    return list;
  }

  function render() {
    const total     = tasks.length;
    const done      = tasks.filter(t => t.done).length;
    const remaining = total - done;
    const pct       = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('remaining-count').textContent = remaining;
    document.getElementById('done-count').textContent      = done;
    document.getElementById('progress-bar').style.width    = pct + '%';

    const lbl = document.getElementById('progress-label');
    if (total > 0 && done === total) {
      lbl.textContent = '🎉 All done!';
      lbl.className   = 'progress-label all-done';
    } else {
      lbl.textContent = pct + '% complete';
      lbl.className   = 'progress-label';
    }

    document.getElementById('clear-btn').disabled = done === 0;

    const visible = sortedVisible();
    const list    = document.getElementById('task-list');

    if (visible.length === 0) {
      if (total > 0 && done === total && filter === 'all') {
        list.innerHTML = `<div class="celebration">
          <div class="celebration-icon">🎉</div>
          <h2>All tasks complete!</h2>
          <p>You crushed it. Add more tasks whenever you're ready.</p>
        </div>`;
      } else {
        const msgs = { done: ['No completed tasks yet.','📋'], active: ['Nothing active — add a task above!','✓'], all: ['Add your first task above!','📝'] };
        const [msg, icon] = msgs[filter] || msgs.all;
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">${icon}</div><p>${msg}</p></div>`;
      }
      return;
    }

    list.innerHTML = visible.map(task => {
      const ds       = getDueStatus(task.due);
      const dueBadge = task.due
        ? `<span class="due-badge ${ds === 'overdue' ? 'overdue' : ds === 'today' ? 'today' : ''}">
             ${ds === 'overdue' ? '⚠ Overdue · ' : ds === 'today' ? '📅 Due today · ' : '📅 '}${formatDue(task.due)}
           </span>`
        : '';

      const priLabel  = { high:'High', med:'Medium', low:'Low' };
      const priBadge  = task.priority && task.priority !== 'none'
        ? `<span class="priority-badge ${task.priority}">${priLabel[task.priority]}</span>` : '';

      const priClass  = task.priority && task.priority !== 'none' ? `priority-${task.priority}` : '';
      const isEditing = editingId === task.id && !task.done;

      const textBlock = isEditing
        ? `<input class="task-edit-input" id="edit-${task.id}" value="${esc(task.text)}"
             onblur="saveEdit('${task.id}')" onkeydown="handleEditKey(event,'${task.id}')"/>`
        : `<span class="task-text" onclick="${task.done ? '' : `startEdit('${task.id}')`}"
             title="${task.done ? '' : 'Click to edit'}">${esc(task.text)}</span>`;

      return `
        <div class="task-item ${task.done ? 'done' : ''} ${priClass}" data-id="${task.id}">
          <div class="task-main">
            <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''}
              aria-label="Toggle complete" onchange="toggleTask('${task.id}')"/>
            <div class="task-body">
              ${textBlock}
              ${(priBadge || dueBadge) ? `<div class="task-meta">${priBadge}${dueBadge}</div>` : ''}
            </div>
            <div class="task-actions">
              ${!task.done ? `<button class="icon-btn" onclick="startEdit('${task.id}')" title="Edit">✎</button>` : ''}
              <button class="icon-btn delete" onclick="deleteTask('${task.id}')" title="Delete">✕</button>
            </div>
          </div>
        </div>`;
    }).join('');

    if (editingId) {
      const el = document.getElementById('edit-' + editingId);
      if (el) { el.focus(); el.select(); }
    }
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text  = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({
      id: uid(), text, done: false,
      priority: document.getElementById('priority-select').value || 'none',
      due: document.getElementById('due-input').value || null,
      createdAt: Date.now()
    });
    input.value = '';
    document.getElementById('priority-select').value = 'none';
    document.getElementById('due-input').value = '';
    input.focus();
    save(); render();
  }

  function toggleTask(id) {
    if (editingId === id) editingId = null;
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save(); render();
  }

  function deleteTask(id) {
    if (editingId === id) editingId = null;
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearCompleted() { tasks = tasks.filter(t => !t.done); save(); render(); }

  function startEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task || task.done) return;
    editingId = id; render();
  }

  function saveEdit(id) {
    const el = document.getElementById('edit-' + id);
    if (!el) return;
    const newText = el.value.trim();
    if (newText) tasks = tasks.map(t => t.id === id ? { ...t, text: newText } : t);
    editingId = null; save(); render();
  }

  function handleEditKey(e, id) {
    if (e.key === 'Enter')  { e.preventDefault(); saveEdit(id); }
    if (e.key === 'Escape') { editingId = null; render(); }
  }

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('clear-btn').addEventListener('click', clearCompleted);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
  document.getElementById('sort-select').addEventListener('change', e => { sort = e.target.value; render(); });

  document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  render();
</script>
</body>
</html>

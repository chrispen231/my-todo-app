<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pearl — Focus & Clarity</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pearl-bg: #F8F9FA;
      --pearl-surface: rgba(255, 255, 255, 0.8);
      --pearl-accent: #5E6AD2; /* Modern Indigo */
      --pearl-accent-soft: rgba(94, 106, 210, 0.1);
      --text-main: #2D3436;
      --text-dim: #636E72;
      --border-soft: rgba(0,0,0,0.05);
      --shadow-luxe: 0 10px 30px rgba(0,0,0,0.04), 0 1px 8px rgba(0,0,0,0.02);
      --radius-lg: 20px;
      --radius-md: 12px;
      
      /* Priority Colors */
      --p-high: #FF7675;
      --p-med: #FAB1A0;
      --p-low: #55E6C1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--pearl-bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(94,106,210,0.05) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(250,177,160,0.05) 0px, transparent 50%);
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .pearl-container {
      width: 100%;
      max-width: 640px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* --- Header Section --- */
    .pearl-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .pearl-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 48px;
      background: linear-gradient(135deg, var(--pearl-accent), #A29BFE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

  .pearl-tagline {
      font-size: 15px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.2px;
      margin-top: -5px;
      margin-bottom: 20px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
    

    .date-badge {
      display: inline-block;
      padding: 6px 16px;
      background: white;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      box-shadow: var(--shadow-luxe);
    }

    /* --- Progress Bar --- */
    .progress-section {
        margin: 24px 0;
    }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; font-weight: 600; color: var(--pearl-accent); }
    .progress-track {
        height: 8px; background: #EEE; border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
        height: 100%; background: var(--pearl-accent); width: 0%; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* --- Smart Input --- */
    .pearl-card {
      background: var(--pearl-surface);
      backdrop-filter: blur(10px);
      border: 1px solid white;
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-luxe);
      margin-bottom: 24px;
    }

    .input-group { display: flex; gap: 12px; margin-bottom: 16px; }
    .main-input {
      flex: 1; border: none; background: rgba(0,0,0,0.03); padding: 14px 20px;
      border-radius: var(--radius-md); font-family: inherit; font-size: 16px;
      transition: all 0.3s;
    }
    .main-input:focus { outline: none; background: white; box-shadow: 0 0 0 3px var(--pearl-accent-soft); }

    .meta-inputs { display: flex; gap: 10px; }
    .meta-inputs select, .meta-inputs input {
        border: 1px solid #EEE; padding: 8px 12px; border-radius: 8px; font-size: 13px; color: var(--text-dim);
    }

    .add-btn-pearl {
      background: var(--pearl-accent); color: white; border: none;
      padding: 0 24px; border-radius: var(--radius-md); font-weight: 600;
      cursor: pointer; transition: transform 0.2s;
    }
    .add-btn-pearl:hover { transform: scale(1.02); background: #4D59BD; }

    /* --- Search & Filters --- */
    .controls {
        display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
    .search-bar {
        border: none; background: white; padding: 8px 16px; border-radius: 99px; font-size: 13px;
        box-shadow: var(--shadow-luxe); width: 180px;
    }

    /* --- Task Item --- */
    .task-item {
      background: white; margin-bottom: 12px; padding: 16px;
      border-radius: var(--radius-md); display: flex; align-items: center;
      gap: 15px; transition: all 0.3s; border: 1px solid transparent;
    }
    .task-item:hover { transform: translateX(5px); box-shadow: var(--shadow-luxe); }
    .task-item.done { opacity: 0.6; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }

    .checkbox-pearl {
      width: 24px; height: 24px; border: 2px solid #EEE; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .checkbox-pearl.checked { background: var(--pearl-accent); border-color: var(--pearl-accent); }
    .checkbox-pearl.checked::after { content: '✓'; color: white; font-size: 14px; }

    .task-content { flex: 1; }
    .task-text { display: block; font-weight: 500; margin-bottom: 4px; }
    .task-tags { display: flex; gap: 8px; }
    .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
    
    .tag-priority-high { background: #FFEAA7; color: #D6A317; }
    .tag-date { color: var(--text-dim); font-weight: 400; }

    .actions { display: flex; gap: 8px; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #CCC; transition: color 0.2s; font-size: 18px; }
    .btn-icon:hover { color: var(--pearl-accent); }
    .btn-delete:hover { color: var(--p-high); }

    .empty-state { text-align: center; padding: 60px; color: #CCC; }
  </style>
</head>
<body>

<div class="pearl-container">
  <header class="pearl-header">
    <h1 class="pearl-logo">Pearl</h1>
    <p class="pearl-tagline">Organize your day with luster and precision. Every task is a gem in the making.</p>
    
    <div class="date-badge" id="current-date">Wednesday, April 22</div>
    
    <div class="progress-section">
        <div class="progress-meta">
            <span id="task-stats">0 tasks remaining</span>
            <span id="pct-label">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>
  </header>

  <div class="pearl-card">
    <div class="input-group">
      <input type="text" id="task-input" class="main-input" placeholder="Capture a thought..." autocomplete="off">
      <button class="add-btn-pearl" onclick="addTask()">Add</button>
    </div>
    <div class="meta-inputs">
      <select id="priority-input">
        <option value="low">🟢 Low</option>
        <option value="med">🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <input type="date" id="date-input">
      <select id="category-input">
        <option value="Personal">Personal</option>
        <option value="Work">Work</option>
        <option value="Urgent">Urgent</option>
      </select>
    </div>
  </div>

  <div class="controls">
    <input type="text" class="search-bar" id="search-input" placeholder="Search tasks..." oninput="render()">
    <div class="filters">
        <select id="sort-select" onchange="render()" style="border:none; background:none; font-size:12px; font-weight:600; color:var(--pearl-accent); cursor:pointer;">
            <option value="newest">Newest</option>
            <option value="priority">Priority</option>
        </select>
    </div>
  </div>

  <div id="task-list">
    </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('pearl-tasks')) || [];

  function save() {
    localStorage.setItem('pearl-tasks', JSON.stringify(tasks));
    render();
  }

  function addTask() {
    const input = document.getElementById('task-input');
    if (!input.value.trim()) return;

    const newTask = {
      id: Date.now(),
      text: input.value,
      priority: document.getElementById('priority-input').value,
      category: document.getElementById('category-input').value,
      date: document.getElementById('date-input').value,
      done: false
    };

    tasks.unshift(newTask);
    input.value = '';
    save();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
    save();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
  }

  function render() {
    const list = document.getElementById('task-list');
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    
    // Filtering and Searching
    let filtered = tasks.filter(t => t.text.toLowerCase().includes(searchTerm));
    
    // Sort logic
    const sortVal = document.getElementById('sort-select').value;
    if(sortVal === 'priority') {
        const pMap = {high: 1, med: 2, low: 3};
        filtered.sort((a, b) => pMap[a.priority] - pMap[b.priority]);
    }

    // Stats
    const doneCount = tasks.filter(t => t.done).length;
    const pct = tasks.length ? Math.round((doneCount / tasks.length) * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('pct-label').innerText = pct + '%';
    document.getElementById('task-stats').innerText = `${tasks.length - doneCount} tasks remaining`;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state">No pearls of wisdom here yet.</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="checkbox-pearl ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
        <div class="task-content">
          <span class="task-text">${t.text}</span>
          <div class="task-tags">
            <span class="tag tag-priority-${t.priority}">${t.priority}</span>
            <span class="tag" style="background:#E0E0E0; color:#666">${t.category}</span>
            ${t.date ? `<span class="tag tag-date">📅 ${t.date}</span>` : ''}
          </div>
        </div>
        <div class="actions">
          <button class="btn-icon btn-delete" onclick="deleteTask(${t.id})">×</button>
        </div>
      </div>
    `).join('');
  }

  // Set date
  const options = { weekday: 'long', month: 'long', day: 'numeric' };
  document.getElementById('current-date').innerText = new Date().toLocaleDateString(undefined, options);

  render();
</script>

</body>
</html>
